version: "2"
run:
  tests: true
linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - unconvert
    - unused
  settings:
    revive:
      rules:
        - name: var-naming
        - name: exported
          arguments:
            - disableStutteringCheck
        - name: package-comments
        - name: error-return
        - name: error-naming
        - name: if-return
        - name: increment-decrement
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: unreachable-code
        - name: redefines-builtin-id
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - errcheck
          - revive
        path: _test\.go
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/Chemaclass/seed-hunter
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
