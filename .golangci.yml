run:
  timeout: 5m
  tests: true

linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - unused
    - unconvert
    - revive
    - gofmt
    - goimports
    - misspell

linters-settings:
  goimports:
    local-prefixes: github.com/Chemaclass/seed-hunter
  revive:
    rules:
      - name: var-naming
      - name: exported
        arguments: ["disableStutteringCheck"]
      - name: package-comments
      - name: error-return
      - name: error-naming
      - name: if-return
      - name: increment-decrement
      - name: receiver-naming
      - name: time-naming
      - name: unexported-return
      - name: unreachable-code
      - name: redefines-builtin-id

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - revive
